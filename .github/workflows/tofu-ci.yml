name: OpenTofu CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  TF_ROOT: ./terraform

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    environment: Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.6.1

      - name: Init
        working-directory: ${{ env.TF_ROOT }}
        run: tofu init -input=false

      - name: Validate
        working-directory: ${{ env.TF_ROOT }}
        run: tofu validate

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    environment: Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.6.1

      - name: Init
        working-directory: ${{ env.TF_ROOT }}
        run: tofu init -input=false

      - name: Plan
        working-directory: ${{ env.TF_ROOT }}
        run: tofu plan -out=plan.out

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tofu-plan
          path: ${{ env.TF_ROOT }}/plan.out

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.6.1

      - name: Init
        working-directory: ${{ env.TF_ROOT }}
        run: tofu init -input=false

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tofu-plan
          path: ${{ env.TF_ROOT }}

      - name: Apply
        working-directory: ${{ env.TF_ROOT }}
        run: tofu apply -auto-approve plan.out

      - name: Upload generated file artifact
        uses: actions/upload-artifact@v4
        with:
          name: tofu-output
          path: ${{ env.TF_ROOT }}/exemplo.txt